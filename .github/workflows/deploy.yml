# ============================================================
# MarketMind AI — CI/CD Pipeline (GitHub Actions)
#
# WHAT THIS DOES:
#   Every push to `main` triggers this workflow:
#   1. Runs a smoke test (imports the package, checks key modules)
#   2. If tests pass, deploys the FastAPI app to Fly.io
#
# WHY CI/CD MATTERS (for interviews):
#   CI/CD means you never manually deploy. Code merged to main
#   automatically goes live. This is standard practice at every
#   engineering team — "it works on my machine" is not acceptable.
#
# HOW TO SET UP:
#   1. Push this repo to GitHub
#   2. Go to Settings -> Secrets and variables -> Actions
#   3. Add secret: FLY_API_TOKEN
#      Get token with: flyctl auth token
#
# JOBS:
#   test   — Runs on every push, fast feedback
#   deploy — Only runs after test passes, only on main branch
# ============================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Import smoke test
        # Verify all modules import without errors.
        # We don't run full agent tests here (they cost API credits).
        # The real tests (Week 6) will use mocked LLM calls.
        run: |
          python -c "from marketmind.api.main import app; print('FastAPI: OK')"
          python -c "from marketmind.agents.state import AgentState; print('Agents: OK')"
          python -c "from marketmind.memory.short_term import get_checkpointer; print('Memory: OK')"
          python -c "from marketmind.rag.pipeline import RAGPipeline; print('RAG: OK')"

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test                    # only run if test job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
